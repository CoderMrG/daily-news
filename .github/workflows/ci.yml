name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline-tests:
    name: Offline tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run offline test suite
        run: python -m daily_news.full_test offline

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: offline-test-report
          path: data/test-reports/*.md
          if-no-files-found: ignore
          retention-days: 14
